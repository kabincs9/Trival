<!DOCTYPE html>

<html lang="en">
    <head>
        <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@500&display=swap" rel="stylesheet">
        <link href="styles.css" rel="stylesheet">
        <title>Trivia!</title>
        <script>
            // TODO: Add code to check answers to questions

            document.addEventListener('DOMContentLoaded', function(){
                // for multiple choice get button with class correct
                let rightanswer = document.querySelectorAll('.correct');
                //loop for this right answer button
                for (let i = 0; i < rightanswer.length; i++)
                {
                    rightanswer[i].addEventListener('click', function(){
                        // to make the button green
                        rightanswer[i].style.backgroundColor = 'green';
                        // to show feedback
                        rightanswer[i].parentElement.querySelector('.feedback').innerHTML = 'Correct!';
                    });
                }

                // same like wrong answer
                let wronganswer = document.querySelectorAll('.incorrect');
                //loop for this wronganswer button
                for (let i = 0; i < wronganswer.length; i++)
                {
                    wronganswer[i].addEventListener('click', function(){
                        // to make the button red
                        wronganswer[i].style.backgroundColor = 'red';
                        // to show feedback
                        wronganswer[i].parentElement.querySelector('.feedback').innerHTML = 'Incorrect!';
                    });
                }

                // to check free resonse
                document.querySelector('#check').addEventListener('click', function() {
                    let userinput = document.querySelector('input');
                    let typeanswer = userinput.value.trim().toLowerCase();
                    // to check if correct
                    if (typeanswer === 'switzerland') {
                        userinput.style.backgroundColor = 'green'; // and for feedback
                        userinput.parentElement.querySelector('.feedback').innerHTML = 'Correct!';
                    }
                    else {
                        userinput.style.backgroundColor = 'red';
                        userinput.parentElement.querySelector('.feedback').innerHTML = 'Incorrect';
                    }
                });
            });
        </script>
    </head>
    <body>
        <div class="header">
            <h1>Trivia!</h1>
        </div>

        <div class="container">
            <div class="section">
                <h2>Part 1: Multiple Choice </h2>
                <hr>
                <!-- TODO: Add multiple choice question here -->
                <h2>Part 1: Multiple Choice </h2>
                <hr>
                <h3>What is the approximate ratio of people to sheep in New Zealand?</h3>
                <button class="incorrect">6 people per 1 sheep</button>
                <button class="incorrect">3 people per 1 sheep</button>
                <button class="incorrect">1 person per 1 sheep</button>
                <button class="incorrect">1 person per 3 sheep</button>
                <button class="correct">1 person per 6 sheep</button>
                <p class="feedback"></p>
            </div>

            <div class="section">
                <h2>Part 2: Free Response</h2>
                <hr>
                <!-- TODO: Add free response question here -->
                <h3>In which country is it illegal to own only one guinea pig, as a lone guinea pig might get lonely?</h3>
                <input type="text" placeholder="Type answer at here"></input>
                <button id="check">Check Answer</button>
                <p class="feedback"></p>
            </div>
        </div>
    </body>
</html>
